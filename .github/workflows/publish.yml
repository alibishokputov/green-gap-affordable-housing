name: Publish Quarto site + dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python environment
        run: uv sync

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: uv run quarto render

      # Compiles app/app.py to WebAssembly into _site/dashboard, so the Shiny
      # dashboard is served as static files alongside the Quarto pages - no
      # server to run. Uses the committed app/tracts.geojson: CI cannot rebuild
      # it (that needs the 2.4 GB rasters), which is why that file is tracked.
      # Must run AFTER `quarto render`, which writes (and would clobber) _site.
      - name: Build Shinylive dashboard
        run: uv run python scripts/build_shinylive.py --out _site/dashboard

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
